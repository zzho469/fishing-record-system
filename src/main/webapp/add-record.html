<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Fishing Record</title>
</head>
<body>
<h2>Add Fishing Record</h2>
<form id="recordForm">
    <label>Date: <input type="date" name="date" required></label><br>
    <label>Location: <input type="text" name="location"></label><br>
    <label>Fish Type: <input type="text" name="fishType"></label><br>
    <label>Size (cm): <input type="number" name="sizeCm"></label><br>
    <label>Bait Used: <input type="text" name="baitUsed"></label><br>
    <label>Notes: <input type="text" name="notes"></label><br>
    <button type="submit">Add Record</button>
</form>

<script>
    document.getElementById('recordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const data = {
            date: form.date.value,
            location: form.location.value,
            fishType: form.fishType.value,
            sizeCm: parseInt(form.sizeCm.value),
            baitUsed: form.baitUsed.value,
            notes: form.notes.value
        };
        const res = await fetch('/fishing-record-system/api/records', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok){
            alert("Record added successfully!");
            form.reset();
        } else {
            alert("Failed to add record!");
        }
    });
</script>
</body>
</html>
